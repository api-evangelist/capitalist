aid: capitalist
url: >-
  https://raw.githubusercontent.com/api-evangelist/capitalist/refs/heads/main/apis.yml
name: Capitalist
description: >-
  Capitalist is a payment platform that lets businesses make mass payouts
  and receive money across multiple payment systems and cryptocurrencies
  without having to open separate accounts with each. The Capitalist API
  automates bulk payouts, exchange between currencies and digital assets,
  account balance queries, and transaction history retrieval for fintech,
  affiliate-network, and marketplace use cases operating across the CIS
  region and globally.
