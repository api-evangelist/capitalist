apis:
  - aid: capitalist:capitalist-api
    name: Capitalist API
    description: >-
      The Capitalist API enables programmatic mass payouts, transfers,
      currency conversion, and balance and transaction management across
      Capitalist's supported payment systems and cryptocurrencies. It is
      designed for businesses that need to pay large numbers of recipients
      (affiliates, freelancers, publishers) without maintaining separate
      accounts in each underlying payment system.
    humanURL: https://capitalist.net/developers/api
    tags:
      - Bulk Payouts
      - Mass Payments
      - Payments
      - Payouts
    properties:
      - type: Documentation
        url: https://capitalist.net/developers/api
      - type: Website
        url: https://capitalist.net/developers/api
    x-features:
      - Mass payout submission for large batches of recipients
      - Receiving money across multiple payment systems in one account
      - Exchange/conversion between supported currencies and crypto
      - Account balance queries across currencies
      - Transaction history retrieval and reconciliation
      - Single integration across fiat and cryptocurrency channels
    x-use-cases:
      - Affiliate and publisher payouts at scale
      - Freelancer and contractor payments in multiple currencies
      - Marketplace and gig-economy seller payouts
      - Crypto-to-fiat and fiat-to-crypto conversion flows
      - Cross-border remittance automation
      - Consolidated reconciliation across multiple payment rails
